<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light">
  <title>Zero Trust BFF · Sign in</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@7/dist/fuse.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js" defer></script>
  <script src="/app.js" defer></script>
</head>
<body>
  <main class="gw">
    <header class="gw-brand">
      <span class="gw-mark" aria-hidden="true">∅</span>
      <span class="gw-word">Zero&nbsp;Trust&nbsp;BFF</span>
      <span class="gw-tag">Proof of Concept</span>
    </header>

    <section class="gw-card" aria-label="Sign in">
      <div id="panel" class="gw-panel" aria-live="polite" aria-busy="true">
        <div class="gw-loading">
          <span class="spinner-border spinner-border-sm" role="status"></span>
          <span class="gw-mono-sm">Establishing secure session…</span>
        </div>
      </div>
    </section>

    <footer class="gw-foot">
      <span class="gw-foot-key">SERVER&#8202;-&#8202;SIDE</span>
      The backend holds the OAuth tokens. They never reach this browser.
    </footer>
  </main>
</body>
</html>
