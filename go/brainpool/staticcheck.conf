# SA1019: this library intentionally uses the deprecated crypto/elliptic generic
# Curve API and the ecdsa.PrivateKey/PublicKey big.Int fields. They are the only
# way to represent and parse Brainpool curves in Go — crypto/ecdh and the newer
# typed key APIs support NIST curves only. The secret-scalar operations that the
# deprecation warns about are routed through the constant-time internal/bp256
# core; the remaining uses only read public values.
checks = ["all", "-SA1019"]
