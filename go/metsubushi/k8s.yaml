apiVersion: apps/v1
kind: Deployment
metadata:
  name: metsubushi
  labels: { app: metsubushi }
spec:
  replicas: 1
  selector:
    matchLabels: { app: metsubushi }
  template:
    metadata:
      labels: { app: metsubushi }
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: metsubushi
          image: metsubushi:latest
          ports:
            - containerPort: 8080
          # Surface pod identity to the page via the downward API.
          env:
            - name: POD_NAME
              valueFrom: { fieldRef: { fieldPath: metadata.name } }
            - name: POD_NAMESPACE
              valueFrom: { fieldRef: { fieldPath: metadata.namespace } }
            - name: POD_IP
              valueFrom: { fieldRef: { fieldPath: status.podIP } }
            - name: NODE_NAME
              valueFrom: { fieldRef: { fieldPath: spec.nodeName } }
            # Set to show a "Log out" button that navigates to this URL.
            # - name: LOGOUT_URL
            #   value: "https://idp.example.com/logout"
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            initialDelaySeconds: 1
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 15
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 100m, memory: 64Mi }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
---
apiVersion: v1
kind: Service
metadata:
  name: metsubushi
spec:
  selector: { app: metsubushi }
  ports:
    - port: 80
      targetPort: 8080
