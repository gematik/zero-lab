# Fully-containerized OIDC demo (no host go-run, no Postgres/snapshot). For the OIDF / multi-replica / snapshot
# HITL use ../../proxy/e2e/ instead (host pep + Postgres). Both front on Caddy :8080.
#
#   browser → caddy(:8080) ──forward_auth──> zero-pep-proxy /oauth2/auth   (gate)
#                          └─reverse_proxy──> upstream (metsubushi: header-reflecting page + /api/headers)
#
# Setup: `cp .env.example .env`, fill the OIDC provider creds, and register the redirect_uri
#   http://127.0.0.1:8080/oauth2/callback
# at that provider. Then `docker compose up --build`: open http://127.0.0.1:8080/ for the metsubushi page
# (gated) — it renders the injected X-Auth-Request-User / -Email / -Groups (/api/headers for the JSON).
services:
  # The protected upstream — metsubushi (header-reflecting page + GET /api/headers echoes the request headers
  # the proxy injects). Built from the workspace via go.work. LOGOUT_URL wires its "Log out" button to the pep
  # proxy's sign-out (relative, so it works on whatever origin Caddy fronts).
  upstream:
    build:
      context: ../../.. # the go/ workspace root (for go.work)
      dockerfile: metsubushi/Dockerfile
    environment:
      LOGOUT_URL: "/oauth2/sign_out"

  zero-pep-proxy:
    build:
      context: ../../.. # the go/ workspace root (for go.work)
      dockerfile: pep/cmd/zero-pep-proxy/Dockerfile
    environment:
      DEBUG: "${DEBUG:-1}"
      PEP_ADDR: ":4180"
      # The public origin the browser reaches the proxy at — the Caddy front, not the proxy directly.
      PEP_PUBLIC_URL: "${PEP_PUBLIC_URL:-http://127.0.0.1:8080}"
      # The cookie is __Host-/Secure by default; this demo is plain http, so relax it. Unset behind HTTPS.
      PEP_INSECURE_COOKIE: "${PEP_INSECURE_COOKIE:-true}"
      PEP_OIDC_ISSUER: "${PEP_OIDC_ISSUER}"
      PEP_OIDC_CLIENT_ID: "${PEP_OIDC_CLIENT_ID}"
      PEP_OIDC_CLIENT_SECRET: "${PEP_OIDC_CLIENT_SECRET}"
      PEP_OIDC_SCOPES: "${PEP_OIDC_SCOPES:-openid email profile}"
      PEP_OIDC_NAME: "${PEP_OIDC_NAME:-OpenID Connect}"
      PEP_OIDC_ACCEPTABLE_SKEW: "${PEP_OIDC_ACCEPTABLE_SKEW:-1m}"

  caddy:
    image: caddy:2
    depends_on: [zero-pep-proxy, upstream]
    ports:
      - "8080:8080"
    environment:
      PEP_UPSTREAM: "zero-pep-proxy:4180"
      APP_UPSTREAM: "upstream:8080"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
