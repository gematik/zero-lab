# pep proxy — HITL / e2e harness. ONE front port: Caddy on :8080 (point your rathole tunnel here). The proxy
# itself runs on the HOST (go run) so it can use local OIDF secrets + the session key; Caddy reaches it via
# host.docker.internal. Postgres and the upstream live in this compose. See README.md.
#
#   rathole / browser → caddy :8080 ──forward_auth──> host pep :4180 /oauth2/auth   (gate)
#                                    ├─reverse_proxy──> host pep :4180   (/oauth2/*, OIDF entity statement)
#                                    └─reverse_proxy──> metsubushi       (protected upstream)
#   host pep :4180 ──DATABASE_URL──> postgres :5432
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zero
      POSTGRES_USER: zero
      POSTGRES_PASSWORD: zero
    ports:
      - "5432:5432"

  # Protected upstream — metsubushi renders the injected X-Auth-Request-*/PEP headers (GET /) + a Log out
  # button (LOGOUT_URL), and echoes request headers as JSON (GET /api/headers). Built from the workspace.
  upstream:
    build:
      context: ../../..
      dockerfile: metsubushi/Dockerfile
    environment:
      LOGOUT_URL: "/oauth2/sign_out"

  caddy:
    image: caddy:2
    depends_on: [upstream]
    ports:
      - "8080:8080" # the one front port — point rathole / your browser here
    environment:
      PEP_UPSTREAM: "host.docker.internal:4180" # the proxy on the host
      APP_UPSTREAM: "upstream:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux: map host.docker.internal to the host
    volumes:
      - ../../cmd/zero-pep-proxy/Caddyfile:/etc/caddy/Caddyfile:ro
