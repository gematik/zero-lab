bind_address: ":8011"
authorization_server:
  issuer: "http://localhost:8011"
  sign_jwk_path: sign.jwk
  # The mock OpenID Provider is baked into the image via -tags mockidp (see docker-compose.pdp.yaml); it
  # registers itself as a provider at <issuer>/mock-idp and runs the real op-callback login path.
  scopes_supported:
    - protected
  products:
    - product_id: pep-product
      product_name: pep S4 e2e
      redirect_uris:
        - http://localhost:8080/oauth2/callback
      scopes:
        - protected
  clients:
    - client_id: pep-client
      product_id: pep-product
      public_jwk:
        kty: EC
        crv: P-256
        kid: a1pogbcdw_yb2mmqSt7FFjj-3tjRglQ8Evz_ARGwTpc
        x: XbzUtT4Jf8lU551ckVNFw4-kBOTzK3psak83ZYKm-SM
        y: GIC-gzT4yOhu_3DqDjiaaf06q_m_1OQKI_hDATbDHu8
