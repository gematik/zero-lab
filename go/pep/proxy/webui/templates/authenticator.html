<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>gematik Authenticator</title>
  {{template "styles"}}
  <style>main.card { text-align: center }</style>
</head>
<body>
  <main class="card">
    <h1>{{if .ProviderName}}{{.ProviderName}}{{else}}gematik Authenticator{{end}}</h1>
    <p class="muted">Follow the instructions in the gematik Authenticator app to sign in.</p>
    <div class="indicator waiting" id="indicator" role="status" aria-label="Waiting for sign-in"></div>
    <p class="status" id="status">Waiting for sign-in…</p>
    <div class="quiet-actions">
      <a href="/oauth2/sign_in{{if .ReturnTo}}?rd={{.ReturnTo | urlquery}}{{end}}">Cancel</a>
    </div>
  </main>
  <script>
    // Open the authenticator:// deep link in this tab (the OS hands it to the Authenticator app; the page
    // stays put), then poll until the app completes the callback.
    window.open("{{.AuthURL}}", "_self");
    var pollURL = "{{.PollURL}}";
    var indicator = document.getElementById("indicator");
    var statusEl = document.getElementById("status");
    var done = false;
    async function tick() {
      if (done) return;
      try {
        var r = await fetch(pollURL, { headers: { "X-Requested-With": "fetch" } });
        if (r.ok) {
          var data = await r.json();
          if (data.authenticated) {
            done = true;
            indicator.className = "indicator success";
            statusEl.className = "status ok";
            statusEl.textContent = "Signed in — returning…";
            setTimeout(function () { location.href = data.return_to || "/"; }, 1000);
            return;
          }
        }
      } catch (e) { /* keep polling */ }
      setTimeout(tick, 2000);
    }
    setTimeout(tick, 2000);
  </script>
</body>
</html>
