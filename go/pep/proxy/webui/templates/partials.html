{{define "styles"}}<style>
  :root { color-scheme: dark }
  body { font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: #0f1115; color: #e6e6e6;
         margin: 0; min-height: 100vh; display: grid; place-items: center }
  main.card { background: #1a1d24; border: 1px solid #2a2f3a; border-radius: 14px; padding: 2rem;
              max-width: 24rem; width: min(90%, 24rem); box-shadow: 0 18px 50px -24px rgba(0,0,0,.6) }
  h1 { font-size: 1.2rem; margin: 0 0 1rem }
  a.provider { display: flex; align-items: center; gap: .65rem; padding: .7rem .9rem; margin: .45rem 0;
               border: 1px solid #2a2f3a; border-radius: 10px; text-decoration: none; color: inherit }
  a.provider:hover { border-color: #3b82f6; background: #20242d }
  a.provider img { width: 24px; height: 24px; border-radius: 5px }
  a.btn { display: inline-block; margin-top: 1rem; background: #3b82f6; color: #fff; padding: .6rem 1rem;
          border-radius: 8px; text-decoration: none }
  .muted { color: #9aa5b1; font-size: .85rem }
  code { background: #2a2f3a; padding: .15rem .4rem; border-radius: 4px }
</style>{{end}}
