<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in</title>
  {{template "styles"}}
  <style>
    main.card { text-align: center }
    img.qr { display: block; margin: 1.1rem auto .2rem; border-radius: 10px; background: #fff; padding: .6rem; max-width: 100% }
    /* On a phone the QR can't be self-scanned — hide it and lead with the on-device app. */
    html[data-mobile] .desktop-only { display: none }
    html:not([data-mobile]) .mobile-only { display: none }
    body.done .desktop-only, body.done .qr-actions { display: none }

    /* One status disc, same footprint whether spinning or resolved. */
    .indicator { width: 3.2rem; height: 3.2rem; margin: 1.4rem auto .5rem; box-sizing: border-box }
    .indicator.waiting { border: 4px solid var(--light-grey); border-top-color: var(--dark-blue);
                         border-radius: 50%; animation: spin .8s linear infinite }
    .indicator.success { border-radius: 50%; background: var(--functional-green); position: relative; animation: none }
    .indicator.success::after { content: ""; position: absolute; left: 36%; top: 18%; width: 26%; height: 52%;
                                border: solid #fff; border-width: 0 4px 4px 0; transform: rotate(45deg) }
    @keyframes spin { to { transform: rotate(360deg) } }

    .status { font-weight: 600; color: var(--dark-grey); margin: 0 }
    .status.ok { color: var(--functional-green); font-size: 1.15rem }

    /* Quiet, secondary affordances — the primary action is the QR / the auto-opened app. */
    .qr-actions { display: flex; flex-direction: column; align-items: center; gap: .3rem; margin-top: 1.3rem }
    .qr-actions a { font-size: .85rem; font-weight: 500; color: var(--dark-grey); text-decoration: underline }
    .qr-actions a:hover { color: var(--dark-blue) }
  </style>
  <script>
    // Decide phone-vs-desktop before first paint so the correct content renders (no QR flash on mobile).
    if (/iphone|ipod|android.*mobile|windows phone|iemobile|blackberry|opera mini/i.test(navigator.userAgent)) {
      document.documentElement.setAttribute("data-mobile", "1");
    }
  </script>
</head>
<body>
  <main class="card">
    <h1>Sign in{{if .ProviderName}} · {{.ProviderName}}{{end}}</h1>

    <div class="desktop-only">
      <p class="muted">Scan with your authenticator app on another device</p>
      <img class="qr" src="{{.QRImage}}" alt="Sign-in QR code" width="320" height="320">
    </div>
    <p class="muted mobile-only">Opening your authenticator app…</p>

    <div class="indicator waiting" id="indicator"></div>
    <p class="status" id="status">Waiting for sign-in…</p>

    <div class="qr-actions">
      <a id="continue" href="{{.AuthURL}}">Continue on this device</a>
      <a href="/oauth2/sign_in{{if .ReturnTo}}?rd={{.ReturnTo | urlquery}}{{end}}">Choose another provider</a>
    </div>
  </main>
  <script>
    var AUTH_URL = "{{.AuthURL}}";
    var pollURL = "{{.PollURL}}";
    var isMobile = document.documentElement.hasAttribute("data-mobile");
    var indicator = document.getElementById("indicator");
    var statusEl = document.getElementById("status");

    if (isMobile) {
      // The deep link opens the app and the browser tab STAYS here, so we keep polling and report the result
      // in this tab. A short delay lets the page paint first. The link is the fallback if the OS didn't launch.
      document.getElementById("continue").textContent = "Open your authenticator app";
      setTimeout(function () { window.location.href = AUTH_URL; }, 400);
    }

    var done = false;
    async function tick() {
      if (done) return;
      try {
        var r = await fetch(pollURL, { headers: { "X-Requested-With": "fetch" } });
        if (r.ok) {
          var data = await r.json();
          if (data.authenticated) {
            done = true;
            document.body.classList.add("done");
            indicator.className = "indicator success";
            statusEl.className = "status ok";
            statusEl.textContent = "Signed in";
            return;
          }
        }
      } catch (e) { /* keep polling */ }
      setTimeout(tick, 2000);
    }
    setTimeout(tick, 2000);
  </script>
</body>
</html>
